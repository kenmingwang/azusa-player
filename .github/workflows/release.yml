name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v1.3.0.1"
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Run Regression Tests
        run: npm run test:run

      - name: Run Popup E2E Tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Package dist
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          ARCHIVE="azusa-player-${VERSION}.zip"
          cd dist
          zip -r "../${ARCHIVE}" .
          cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Resolve Tag
        if: github.event_name == 'workflow_dispatch'
        run: echo "MANUAL_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.MANUAL_TAG || github.ref_name }}
          name: ${{ env.MANUAL_TAG || github.ref_name }}
          generate_release_notes: true
          files: ${{ env.ARCHIVE }}
