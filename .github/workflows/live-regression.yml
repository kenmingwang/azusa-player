name: Live Regression

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  live-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install
        run: npm ci

      - name: Run Live Regression Tests
        run: npm run test:live
